- hosts: web
  become: yes
  tasks:
    - name: Docker eklentisini kontrol et
      apt:
        name: docker-compose-v2
        state: present

    - name: Mevcut sistemi durdur ve temizle
      shell: "cd /home/ubuntu/project && docker compose down --remove-orphans || true"

    - name: Dosyaları kopyala
      copy:
        src: ../
        dest: /home/ubuntu/project/

    - name: Adim 1 - Sadece Backend Build
      shell: "cd /home/ubuntu/project && docker compose build --no-cache backend"

    - name: Adim 2 - Sadece Frontend Build
      shell: "cd /home/ubuntu/project && docker compose build --no-cache frontend"

    - name: Adim 3 - MHRS Sistemini Baslat
      shell: "cd /home/ubuntu/project && docker compose up -d"