- hosts: web
  become: yes
  tasks:
    - name: Docker eklentilerini guncelle
      apt:
        update_cache: yes

    - name: Docker Compose (V2) yukle
      apt:
        name: docker-compose-v2
        state: present

    - name: Mevcut sistemi durdur
      # Hem yeni hem eski komutu deniyoruz ki hata almayalım
      shell: "cd /home/ubuntu/project && (docker compose down || docker-compose down || true)"

    - name: Proje klasörünü temizle ve olustur
      file:
        path: /home/ubuntu/project
        state: directory
        mode: '0755'

    - name: Dosyaları kopyala
      copy:
        src: ../
        dest: /home/ubuntu/project/

    - name: MHRS Sistemini Başlat (V2 Komutu ile)
      shell: "cd /home/ubuntu/project && docker compose up -d --build"