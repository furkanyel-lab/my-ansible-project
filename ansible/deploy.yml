- hosts: web
  become: yes
  tasks:
    - name: Docker eklentisini kontrol et
      apt:
        name: docker-compose-v2
        state: present

    - name: 80 portunu isgal eden her seyi temizle
      shell: |
        # Nginx veya Apache varsa durdur
        systemctl stop nginx || true
        systemctl stop apache2 || true
        # 80 portunu kullanan her turlu sureci oldur
        fuser -k 80/tcp || true
        # Eski tum Docker konteynerlarini temizle
        docker ps -q --filter "publish=80" | xargs -r docker rm -f || true

    - name: Dosyalari kopyala
      copy:
        src: ../
        dest: /home/ubuntu/project/

    - name: MHRS Sistemini Temiz Build ile Baslat
      shell: "cd /home/ubuntu/project && docker compose up -d --build"