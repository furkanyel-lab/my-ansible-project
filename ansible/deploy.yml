- hosts: web
  become: yes
  tasks:
    - name: Mevcut konteynerları durdur ve temizle
      shell: "docker-compose -f /home/ubuntu/project/docker-compose.yml down --remove-orphans || true"

    - name: Proje klasörünü temizle
      file:
        path: /home/ubuntu/project
        state: absent

    - name: Proje klasörünü yeniden oluştur
      file:
        path: /home/ubuntu/project
        state: directory
        mode: '0755'

    - name: Dosyaları kopyala
      copy:
        src: ../
        dest: /home/ubuntu/project/

    - name: MHRS Sistemini Başlat
      shell: "cd /home/ubuntu/project && docker-compose up -d --build"