- hosts: web
  become: yes
  tasks:
    - name: Docker eklentisini kontrol et
      apt:
        name: docker-compose-v2
        state: present

    - name: 80 portunu kullanan eski servisleri durdur (Isgalci temizligi)
      shell: |
        systemctl stop nginx || true
        systemctl stop apache2 || true
        fuser -k 80/tcp || true

    - name: Mevcut Docker sistemini durdur
      shell: "cd /home/ubuntu/project && docker compose down --remove-orphans || true"

    - name: Dosyaları kopyala
      copy:
        src: ../
        dest: /home/ubuntu/project/

    - name: MHRS Build ve Baslat
      shell: "cd /home/ubuntu/project && docker compose up -d --build"