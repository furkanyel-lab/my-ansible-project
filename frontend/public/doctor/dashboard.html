<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHRS - Doktor Yönetim Paneli</title>
    <style>
        /* --- GENEL TASARIM VE RENKLER --- */
        :root {
            --primary-green: #28a745;
            --primary-blue: #007bff;
            --danger-red: #dc3545;
            --bg-light: #f4f7f9;
            --text-dark: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 900px;
        }

        /* --- ÜST BİLGİ ALANI --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h2 { color: var(--text-dark); margin: 0; font-size: 26px; }

        .logout-btn {
            background-color: var(--danger-red);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn:hover { background-color: #a71d2a; transform: scale(1.02); }

        .doc-info {
            font-size: 20px;
            color: var(--primary-blue);
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h3 { 
            color: #555; 
            margin-top: 40px; 
            margin-bottom: 15px; 
            border-left: 4px solid var(--primary-blue); 
            padding-left: 10px;
        }

        /* --- TABLO STİLLERİ --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        th { background-color: var(--primary-green); color: white; text-align: left; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: var(--text-dark); }
        tr:hover { background-color: #fcfcfc; }

        /* --- BUTONLAR VE ETİKETLER --- */
        .complete-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .complete-btn:hover { background-color: #0056b3; transform: scale(1.05); }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            background-color: #d4edda;
            color: var(--primary-green);
        }

        /* --- MODERN ONAY MODALI (ORTALANMIŞ) --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1002;
            backdrop-filter: blur(3px);
        }

        #confirm-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 35px;
            border-radius: 18px;
            z-index: 1003;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .modal-btns { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        
        .btn-yes { background: var(--primary-green); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-no { background: #6c757d; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .no-data { text-align: center; padding: 30px; color: #999; font-style: italic; }
    </style>
</head>
<body>

    <div id="modal-overlay"></div>
    <div id="confirm-modal">
        <div style="font-size: 40px; margin-bottom: 10px;">📋</div>
        <p style="font-size: 18px; color: #333; font-weight: 500;">Bu randevuyu tamamlamak istiyor musunuz?</p>
        <div class="modal-btns">
            <button class="btn-yes" onclick="processComplete()">Evet, Tamamla</button>
            <button class="btn-no" onclick="closeConfirmModal()">Vazgeç</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h2>Doktor Yönetim Paneli</h2>
            <button class="logout-btn" onclick="logout()">🔒 Çıkış Yap</button>
        </div>

        <div class="doc-info">
            <span>📍</span> 
            <span id="docTitle">Yükleniyor...</span> 
            <span style="font-size: 14px; color:#999; font-weight: 400;">(Aktif Oturum)</span>
        </div>

        <h3>Aktif Randevular</h3>
        <table>
            <thead>
                <tr>
                    <th>Hasta Adı</th>
                    <th>Tarih</th>
                    <th style="text-align: center;">İşlem</th>
                </tr>
            </thead>
            <tbody id="appointmentTableBody"></tbody>
        </table>

        <h3>Geçmiş / Tamamlanan Randevular</h3>
        <table style="opacity: 0.8;">
            <thead>
                <tr>
                    <th>Hasta Adı</th>
                    <th>Tarih</th>
                    <th style="text-align: center;">Durum</th>
                </tr>
            </thead>
            <tbody id="completedTableBody"></tbody>
        </table>
    </div>

    <script>
        const loggedInDoctor = localStorage.getItem('loggedDoc');
        let allApps = [];
        let selectedDate = ""; // Tamamlanacak tarih için hafıza

        // 1. OTURUM KONTROLÜ
        if (!loggedInDoctor) {
            window.location.href = "../login.html";
        } else {
            document.getElementById('docTitle').innerText = loggedInDoctor;
        }

        // 2. VERİLERİ ÇEK
        async function fetchMyData() {
            try {
                const response = await fetch('http://localhost:5000/api/appointments');
                if(response.ok) {
                    allApps = await response.json();
                    renderTables();
                }
            } catch (error) { console.error("Bağlantı hatası:", error); }
        }

        // 3. TABLOLARI OLUŞTUR
        function renderTables() {
            const activeBody = document.getElementById('appointmentTableBody');
            const completedBody = document.getElementById('completedTableBody');
            
            const myApps = allApps.filter(item => item.doctorName === loggedInDoctor);

            activeBody.innerHTML = "";
            completedBody.innerHTML = "";

            let activeCount = 0;
            let pastCount = 0;

            myApps.forEach(app => {
                if (app.status === 'completed') {
                    pastCount++;
                    completedBody.innerHTML += `
                        <tr>
                            <td>Onaylı Hasta</td>
                            <td>${app.appointmentDate}</td>
                            <td style="text-align: center;"><span class="status-badge">✅ Tamamlandı</span></td>
                        </tr>`;
                } else {
                    activeCount++;
                    activeBody.innerHTML += `
                        <tr>
                            <td>Onaylı Hasta</td>
                            <td>${app.appointmentDate}</td>
                            <td style="text-align: center;">
                                <button class="complete-btn" onclick="openConfirmModal('${app.appointmentDate}')">Tamamla</button>
                            </td>
                        </tr>`;
                }
            });

            if(activeCount === 0) activeBody.innerHTML = '<tr><td colspan="3" class="no-data">Aktif randevu bulunmamaktadır.</td></tr>';
            if(pastCount === 0) completedBody.innerHTML = '<tr><td colspan="3" class="no-data">Geçmiş randevu kaydı bulunamadı.</td></tr>';
        }

        // 4. MODAL YÖNETİMİ
        function openConfirmModal(date) {
            selectedDate = date; // Hangi satıra basıldığını kaydet
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('confirm-modal').style.display = 'block';
        }

        function closeConfirmModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('confirm-modal').style.display = 'none';
        }

        // 5. BACKEND TAMAMLAMA İŞLEMİ
        async function processComplete() {
            try {
                const res = await fetch(`http://localhost:5000/api/appointments/complete`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doctorName: loggedInDoctor, appointmentDate: selectedDate })
                });

                if(res.ok) {
                    closeConfirmModal();
                    fetchMyData(); // Tabloyu yenile
                } else {
                    alert("İşlem sırasında bir hata oluştu.");
                }
            } catch (e) { alert("Sunucuya ulaşılamıyor!"); }
        }

        // 6. ÇIKIŞ YAP
        function logout() {
            localStorage.removeItem('loggedDoc');
            window.location.href = "../login.html";
        }

        window.onload = fetchMyData;
    </script>
</body>
</html>
